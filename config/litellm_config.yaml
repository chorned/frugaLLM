# ── Router Settings ──
# IMPORTANT: All router_settings (including fallbacks) are defined in
# dynamic_models.yaml, which is the single source of truth.
# LiteLLM's include: mechanism OVERWRITES (not merges) router_settings,
# so defining them here would be silently dropped when the dynamic
# models file is loaded. See: 2026-07-22 thinker 503 incident.
