general_settings:
  alerting: []
  allow_client_side_credentials: true
  master_key: sk-sidecar-1
include:
- dynamic_models.yaml
litellm_settings:
  additional_drop_params:
  - provider
  cache: true
  cache_params:
    ttl: 300
    type: local
  callbacks: frugallm.custom_callbacks.hermes_proxy_handler
  drop_params: true
  failure_callback:
  - langfuse
  - postgres
  - prometheus
  middleware:
  - frugallm.gatekeeper.GatekeeperMiddleware
  set_verbose: true
  success_callback:
  - langfuse
  - postgres
  - prometheus
model_list:
- litellm_params:
    api_base: http://100.80.59.45:8080/v1
    api_key: na
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
        preserve_thinking: false
    max_retries: 2
    model: openai//models/gemma-4-12b-it-Q5_K_M.gguf
    stop:
    - <turn|>
    - </s>
    - <eos>
    stream_timeout: 300
    timeout: 300
  model_name: auto
- litellm_params:
    api_base: http://100.80.59.45:8080/v1
    api_key: na
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
        preserve_thinking: false
    max_retries: 2
    model: openai//models/gemma-4-12b-it-Q5_K_M.gguf
    stop:
    - <turn|>
    - </s>
    - <eos>
    stream_timeout: 300
    timeout: 300
  model_name: reasoning
- litellm_params:
    api_base: http://127.0.0.1:11434
    max_retries: 0
    model: ollama/hermes:latest
    timeout: 60
  model_name: local
- litellm_params:
    api_key: os.environ/GEMINI_API_KEY
    model: gemini/gemini-2.5-pro
    timeout: 300
  model_name: gemini-2.5-pro
router_settings:
  allowed_fails: 3
  num_retries: 2
  retry_after: 60
  routing_strategy: simple-shuffle
  stream_timeout: 300
  timeout: 300
